<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>DEIMOS Mission - Extended Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00d4ff;
            --correct: #00ff88;
            --wrong: #ff3c3c;
            --bg: #000810;
            --glow: rgba(0, 212, 255, 0.25);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                linear-gradient(var(--glow) 1px, transparent 1px),
                linear-gradient(90deg, var(--glow) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .quiz-container {
            width: 850px;
            background: rgba(0, 5, 10, 0.9);
            border: 2px solid var(--accent);
            box-shadow: 0 0 40px var(--glow);
            backdrop-filter: blur(15px);
            padding: 40px;
            position: relative;
        }

        .header {
            font-family: 'Orbitron';
            color: var(--accent);
            text-align: center;
            letter-spacing: 5px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--accent);
            padding-bottom: 15px;
            text-shadow: 0 0 15px var(--accent);
            text-transform: uppercase;
        }

        .question-text {
            font-size: 1.5rem;
            margin-bottom: 30px;
            min-height: 70px;
            line-height: 1.4;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--accent);
            color: white;
            padding: 18px;
            font-family: 'Rajdhani';
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover:not(:disabled) {
            background: var(--glow);
            border-color: white;
            padding-left: 25px;
        }

        .option-btn:disabled { cursor: default; }

        .correct { background: rgba(0, 255, 136, 0.2) !important; border-color: var(--correct) !important; color: var(--correct); box-shadow: 0 0 15px rgba(0, 255, 136, 0.3); }
        .wrong { background: rgba(255, 60, 60, 0.2) !important; border-color: var(--wrong) !important; color: var(--wrong); box-shadow: 0 0 15px rgba(255, 60, 60, 0.3); }

        .fact-panel {
            margin-top: 30px;
            padding: 20px;
            border-left: 4px solid var(--accent);
            background: rgba(0, 212, 255, 0.05);
            display: none;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fact-title {
            font-family: 'Orbitron';
            font-size: 0.85rem;
            color: var(--accent);
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
        }

        .next-btn {
            margin-top: 25px;
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 15px;
            font-family: 'Orbitron';
            font-size: 1rem;
            cursor: pointer;
            display: none;
            transition: 0.4s;
            letter-spacing: 2px;
        }

        .next-btn:hover { background: var(--accent); color: black; box-shadow: 0 0 20px var(--accent); }

        .footer-info {
            margin-top: 35px;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            opacity: 0.6;
            font-family: 'Orbitron';
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div class="header">DEIMOS DATA VERIFICATION</div>

        <div id="quiz-content">
            <div class="question-text" id="question">Initializing data...</div>
            
            <div class="options-grid" id="options"></div>

            <div class="fact-panel" id="fact-box">
                <span class="fact-title">ANALYSIS RESULT:</span>
                <p id="fact-text"></p>
            </div>

            <button class="next-btn" id="next-button" onclick="loadNextQuestion()">CONTINUE SCAN</button>
        </div>

        <div class="footer-info">
            <span id="progress">STEP: 1 / 6</span>
            <a href="game.html" style="color: var(--wrong); text-decoration: none;">[ ABORT MISSION ]</a>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "Яка головна візуальна відмінність Деймоса від Фобоса при спостереженні?",
                options: [
                    "Має яскраво-червоний колір",
                    "На ньому зовсім немає кратерів",
                    "Поверхня набагато гладкіша через пил",
                    "Має ідеальну кулясту форму"
                ],
                correct: 2,
                fact: "На Деймосі шар реголіту (космічного пилу) може сягати 100 метрів. Це 'ховає' гострі краї кратерів, роблячи його поверхню гладкою на вигляд."
            },
            {
                q: "Яка доля чекає на Деймос у далекому майбутньому?",
                options: [
                    "Впаде на Марс швидше за Фобос",
                    "Поступово віддаляється від планети",
                    "Перетвориться на кільце",
                    "Зіткнеться з Сонцем"
                ],
                correct: 1,
                fact: "Деймос знаходиться вище синхронної орбіти Марса. Гравітаційна взаємодія поступово штовхає його далі від планети, поки він не покине її зовсім."
            },
            {
                q: "Скільки часу потрібно Деймосу для одного оберту навколо Марса?",
                options: [
                    "7 годин 39 хвилин",
                    "Приблизно 30 годин",
                    "88 днів",
                    "Всього 1 годину"
                ],
                correct: 1,
                fact: "Деймосу потрібно близько 1.26 земної доби (30 годин), щоб обійти Марс. Це трохи довше, ніж триває один марсіанський день."
            },
            {
                q: "Хто офіційно відкрив Деймос у 1877 році?",
                options: [
                    "Нікола Тесла",
                    "Йоганн Кеплер",
                    "Асаф Голл",
                    "Галілео Галілей"
                ],
                correct: 2,
                fact: "Американський астроном Асаф Голл відкрив Деймос 12 серпня 1877 року, а через кілька днів помітив і Фобос."
            },
            {
                q: "Що означає назва «Деймос» у перекладі з давньогрецької?",
                options: [
                    "Жах",
                    "Темрява",
                    "Швидкість",
                    "Камінь"
                ],
                correct: 0,
                fact: "Деймос (Жах) та Фобос (Страх) — це сини бога війни Ареса. Вони супроводжували батька у кожній битві."
            },
            {
                q: "Який приблизний діаметр цього супутника?",
                options: [
                    "Понад 100 км",
                    "Близько 12 км",
                    "1 метр",
                    "Як у Місяця (3474 км)"
                ],
                correct: 1,
                fact: "Деймос — один із найменших супутників у Сонячній системі. Його середній радіус складає всього 6.2 км."
            }
        ];

        let currentIdx = 0;

        function initTheme() {
            const themeColor = localStorage.getItem('marsTheme') || '#00d4ff';
            document.documentElement.style.setProperty('--accent', themeColor);
            const r = parseInt(themeColor.slice(1, 3), 16);
            const g = parseInt(themeColor.slice(3, 5), 16);
            const b = parseInt(themeColor.slice(5, 7), 16);
            document.documentElement.style.setProperty('--glow', `rgba(${r}, ${g}, ${b}, 0.2)`);
        }

        function loadQuestion() {
            const qData = questions[currentIdx];
            document.getElementById('question').innerText = qData.q;
            document.getElementById('progress').innerText = `STEP: ${currentIdx + 1} / ${questions.length}`;
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            qData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(btn);
            });

            document.getElementById('fact-box').style.display = 'none';
            document.getElementById('next-button').style.display = 'none';
        }

        function checkAnswer(selectedIdx) {
            const qData = questions[currentIdx];
            const buttons = document.querySelectorAll('.option-btn');
            
            buttons.forEach((btn, index) => {
                btn.disabled = true;
                if(index === qData.correct) btn.classList.add('correct');
                if(index === selectedIdx && selectedIdx !== qData.correct) btn.classList.add('wrong');
            });

            document.getElementById('fact-text').innerText = qData.fact;
            document.getElementById('fact-box').style.display = 'block';
            document.getElementById('next-button').style.display = 'block';
            
            if(currentIdx === questions.length - 1) {
                document.getElementById('next-button').innerText = "FINALIZE EXPEDITION";
                document.getElementById('next-button').onclick = () => window.location.href = 'game.html';
            }
        }

        function loadNextQuestion() {
            currentIdx++;
            loadQuestion();
        }

        initTheme();
        loadQuestion();
    </script>

     <audio id="bgMusic" loop>
    <source src="test_voce.mp3" type="audio/mpeg">
</audio>

<div id="music-control" style="position: fixed; top: 20px; right: 20px; cursor: pointer; z-index: 100; opacity: 0.5;">
    <span id="music-icon">🔇</span>
</div>

<script>
    const music = document.getElementById('bgMusic');
    const musicIcon = document.getElementById('music-icon');
    
    // Встановлюємо гучність (0.3 - оптимально для фону)
    music.volume = 0.3;

    // Функція активації звуку
    function startMusic() {
        music.play().then(() => {
            musicIcon.innerText = "🔊";
            document.getElementById('music-control').style.opacity = "1";
        }).catch(e => console.log("Чекаємо на клік для запуску звуку"));
    }

    // Запускаємо при першому кліку по будь-якій частині екрана
    window.addEventListener('click', startMusic, { once: true });

    // Кнопка вмикання/вимикання звуку
    document.getElementById('music-control').onclick = (e) => {
        e.stopPropagation(); // щоб не спрацював startMusic повторно
        if (music.paused) {
            music.play();
            musicIcon.innerText = "🔊";
        } else {
            music.pause();
            musicIcon.innerText = "🔇";
        }
    };

    /* Твій існуючий скрипт loadTheme, loadQuestion тощо... */
</script>
</body>
</html>
