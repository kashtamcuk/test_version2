<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>PHOBOS Mission - Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00d4ff;
            --correct: #00ff88;
            --wrong: #ff3c3c;
            --bg: #000810;
            --glow: rgba(0, 212, 255, 0.25);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                linear-gradient(var(--glow) 1px, transparent 1px),
                linear-gradient(90deg, var(--glow) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .quiz-container {
            width: 800px;
            background: rgba(0, 5, 10, 0.9);
            border: 2px solid var(--accent);
            box-shadow: 0 0 30px var(--glow);
            backdrop-filter: blur(10px);
            padding: 40px;
            position: relative;
        }

        .header {
            font-family: 'Orbitron';
            color: var(--accent);
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--accent);
            padding-bottom: 15px;
            text-shadow: 0 0 10px var(--accent);
        }

        .question-text {
            font-size: 1.4rem;
            margin-bottom: 25px;
            min-height: 60px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--accent);
            color: white;
            padding: 15px;
            font-family: 'Rajdhani';
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            background: var(--glow);
            transform: translateX(5px);
        }

        .option-btn:disabled { cursor: default; }

        /* Класи для результатів */
        .correct { background: rgba(0, 255, 136, 0.2) !important; border-color: var(--correct) !important; color: var(--correct); }
        .wrong { background: rgba(255, 60, 60, 0.2) !important; border-color: var(--wrong) !important; color: var(--wrong); }

        .fact-panel {
            margin-top: 25px;
            padding: 20px;
            border-left: 4px solid var(--accent);
            background: rgba(255, 255, 255, 0.03);
            display: none; /* З'являється після відповіді */
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fact-title {
            font-family: 'Orbitron';
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 5px;
            display: block;
        }

        .next-btn {
            margin-top: 20px;
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px;
            font-family: 'Orbitron';
            cursor: pointer;
            display: none;
            transition: 0.3s;
        }

        .next-btn:hover { background: var(--accent); color: black; }

        .footer-info {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div class="header">PHOBOS MISSION DATA CHECK</div>

        <div id="quiz-box">
            <div class="question-text" id="question">Завантаження питання...</div>
            
            <div class="options-grid" id="options">
                </div>

            <div class="fact-panel" id="fact-box">
                <span class="fact-title">АРХІВНИЙ ФАКТ:</span>
                <p id="fact-text"></p>
            </div>

            <button class="next-btn" id="next-button" onclick="loadNextQuestion()">НАСТУПНЕ ПИТАННЯ</button>
        </div>

        <div class="footer-info">
            <span id="progress">Питання 1 з 4</span>
            <a href="game.html" style="color: var(--wrong); text-decoration: none;">[ ПЕРЕВАТИ МІСІЮ ]</a>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "Яке походження Фобоса вважається найбільш імовірним?",
                options: [
                    "Уламок Землі після зіткнення",
                    "Захоплений гравітацією астероїд",
                    "Частина Марса, що відокремилася",
                    "Згасла комета"
                ],
                correct: 1,
                fact: "Фобос за складом схожий на астероїди типу C. Це підтримує теорію, що Марс 'спіймав' його з головного поясу астероїдів мільярди років тому."
            },
            {
                q: "Яка доля чекає на Фобос через 30-50 млн років?",
                options: [
                    "Вилетить у відкритий космос",
                    "Розпадеться, утворивши кільце",
                    "Зіткнеться з Деймосом",
                    "Зупинить своє обертання"
                ],
                correct: 1,
                fact: "Гравітація Марса поступово притягує супутник. Коли він перетне межу Роша, припливні сили розірвуть його на тисячі уламків."
            },
            {
                q: "Як називається найбільший ударний кратер на Фобосі?",
                options: [
                    "Олімп",
                    "Стікні",
                    "Кассіні",
                    "Марінер"
                ],
                correct: 1,
                fact: "Кратер Стікні має діаметр 9 км. Удар, що його утворив, був настільки потужним, що супутник ледь не розколовся."
            },
            {
                q: "За який час Фобос робить повний оберт навколо Марса?",
                options: [
                    "24 години",
                    "30 днів",
                    "7 годин 39 хвилин",
                    "12 годин"
                ],
                correct: 2,
                fact: "Це настільки швидко, що Фобос обганяє обертання самого Марса. Для спостерігача на планеті він сходить на заході, а не на сході."
            }
        ];

        let currentIdx = 0;

        function initTheme() {
            const themeColor = localStorage.getItem('marsTheme') || '#00d4ff';
            document.documentElement.style.setProperty('--accent', themeColor);
            const r = parseInt(themeColor.slice(1, 3), 16);
            const g = parseInt(themeColor.slice(3, 5), 16);
            const b = parseInt(themeColor.slice(5, 7), 16);
            document.documentElement.style.setProperty('--glow', `rgba(${r}, ${g}, ${b}, 0.25)`);
        }

        function loadQuestion() {
            const qData = questions[currentIdx];
            document.getElementById('question').innerText = qData.q;
            document.getElementById('progress').innerText = `Питання ${currentIdx + 1} з ${questions.length}`;
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            qData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(btn);
            });

            document.getElementById('fact-box').style.display = 'none';
            document.getElementById('next-button').style.display = 'none';
        }

        function checkAnswer(selectedIdx) {
            const qData = questions[currentIdx];
            const buttons = document.querySelectorAll('.option-btn');
            
            buttons.forEach((btn, index) => {
                btn.disabled = true;
                if(index === qData.correct) btn.classList.add('correct');
                if(index === selectedIdx && selectedIdx !== qData.correct) btn.classList.add('wrong');
            });

            document.getElementById('fact-text').innerText = qData.fact;
            document.getElementById('fact-box').style.display = 'block';
            document.getElementById('next-button').style.display = 'block';
            
            if(currentIdx === questions.length - 1) {
                document.getElementById('next-button').innerText = "ЗАВЕРШИТИ МІСІЮ";
                document.getElementById('next-button').onclick = () => window.location.href = 'game.html';
            }
        }

        function loadNextQuestion() {
            currentIdx++;
            loadQuestion();
        }

        initTheme();
        loadQuestion();
    </script>

     <audio id="bgMusic" loop>
    <source src="test_voce.mp3" type="audio/mpeg">
</audio>

<div id="music-control" style="position: fixed; top: 20px; right: 20px; cursor: pointer; z-index: 100; opacity: 0.5;">
    <span id="music-icon">🔇</span>
</div>

<script>
    const music = document.getElementById('bgMusic');
    const musicIcon = document.getElementById('music-icon');
    
    // Встановлюємо гучність (0.3 - оптимально для фону)
    music.volume = 0.3;

    // Функція активації звуку
    function startMusic() {
        music.play().then(() => {
            musicIcon.innerText = "🔊";
            document.getElementById('music-control').style.opacity = "1";
        }).catch(e => console.log("Чекаємо на клік для запуску звуку"));
    }

    // Запускаємо при першому кліку по будь-якій частині екрана
    window.addEventListener('click', startMusic, { once: true });

    // Кнопка вмикання/вимикання звуку
    document.getElementById('music-control').onclick = (e) => {
        e.stopPropagation(); // щоб не спрацював startMusic повторно
        if (music.paused) {
            music.play();
            musicIcon.innerText = "🔊";
        } else {
            music.pause();
            musicIcon.innerText = "🔇";
        }
    };

    /* Твій існуючий скрипт loadTheme, loadQuestion тощо... */
</script>
</body>
</html>
