<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>ARES Navigation Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Основні кольори, що підтримують динамічну зміну */
            --accent: #00d4ff;
            --exit-color: #ff3c3c;
            --bg: #000810;
            --glow: rgba(0, 212, 255, 0.3);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Динамічна сітка, колір якої теж змінюється */
            background-image: 
                linear-gradient(var(--glow) 1px, transparent 1px),
                linear-gradient(90deg, var(--glow) 1px, transparent 1px);
            background-size: 50px 50px;
            transition: 0.5s;
        }

        .terminal-frame {
            position: relative;
            width: 90vw;
            height: 85vh;
            border: 2px solid var(--accent);
            background: rgba(0, 5, 10, 0.9);
            /* Потужне світіння рамки */
            box-shadow: inset 0 0 30px var(--glow), 0 0 20px var(--glow);
            display: grid;
            grid-template-columns: 220px 1fr 220px;
            grid-template-rows: 80px 1fr 100px;
            backdrop-filter: blur(10px);
            transition: border-color 0.5s, box-shadow 0.5s;
        }

        .header {
            grid-column: 1 / span 3;
            border-bottom: 1px solid var(--accent);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron';
            letter-spacing: 5px;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent);
            font-size: 1.5rem;
        }

        .side-panel {
            padding: 25px;
            font-size: 0.8rem;
            color: var(--accent);
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .side-panel.right {
            border-right: none;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            text-align: right;
        }

        /* ЦЕНТРАЛЬНИЙ ПРОСТІР БЕЗ РАДАРУ */
        .main-display {
            position: relative;
            overflow: hidden;
        }

        /* Об'єкти простору */
        .node {
            position: absolute;
            text-decoration: none;
            color: white;
            text-align: center;
            transition: transform 0.3s;
            z-index: 5;
        }

        .dot {
            width: 14px; height: 14px;
            background: var(--accent);
            border-radius: 50%;
            /* Світіння точок */
            box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent);
            margin: 0 auto 12px;
            transition: 0.5s;
        }

        .label {
            font-family: 'Orbitron';
            font-size: 0.75rem;
            border: 1px solid var(--accent);
            padding: 5px 12px;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 10px var(--glow);
            transition: 0.5s;
        }

        /* Позиції об'єктів */
        #mars { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #phobos { top: 20%; left: 30%; }
        #deimos { top: 40%; right: 20%; }

        #mars .dot { 
            width: 80px; height: 80px; 
            background: radial-gradient(circle, var(--accent) 0%, #000 80%);
            border: 2px solid white;
        }

        .node:hover { transform: translate(-50%, -50%) scale(1.15); }
        #phobos:hover, #deimos:hover { transform: scale(1.15); }

        /* НИЖНЯ ПАНЕЛЬ */
        .footer {
            grid-column: 1 / span 3;
            border-top: 1px solid var(--accent);
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(0, 212, 255, 0.02);
        }

        .exit-btn {
            background: rgba(255, 60, 60, 0.05);
            border: 2px solid var(--exit-color);
            color: var(--exit-color);
            padding: 15px 50px;
            font-family: 'Orbitron';
            font-weight: bold;
            text-decoration: none;
            letter-spacing: 3px;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(255, 60, 60, 0.2);
        }

        .exit-btn:hover {
            background: var(--exit-color);
            color: black;
            box-shadow: 0 0 40px var(--exit-color);
        }

        .stat-box { 
            border: 1px solid var(--accent); 
            padding: 12px; 
            background: rgba(0,0,0,0.5);
            box-shadow: inset 0 0 10px var(--glow);
            transition: 0.5s;
        }

        .blink { animation: blink 1.5s infinite; color: var(--exit-color); text-shadow: 0 0 10px var(--exit-color); }
        @keyframes blink { 50% { opacity: 0.3; } }

    </style>
</head>
<body>

    <div class="terminal-frame">
        <div class="header">INTERSTELLAR NAVIGATION BRIDGE</div>

        <div class="side-panel">
            <div class="stat-box">
                STATUS: ACTIVE<br>
                SIGNAL: 98.4%
            </div>
            <div class="stat-box">
                FUEL: 82%<br>
                OXYGEN: NOMINAL
            </div>
            <div style="margin-top: auto; opacity: 0.7; letter-spacing: 1px;">SYSTEM_V.2.6</div>
        </div>

        <div class="main-display">
            <a href="quiz_phobos.html" class="node" id="phobos">
                <div class="dot"></div>
                <div class="label">OBJ_PHOBOS</div>
            </a>

            <a href="quiz_deimos.html" class="node" id="deimos">
                <div class="dot"></div>
                <div class="label">OBJ_DEIMOS</div>
            </a>

            <a href="quiz_mars.html" class="node" id="mars">
                <div class="dot"></div>
                <div class="label" style="font-size: 1.1rem; letter-spacing: 3px;">TARGET_MARS</div>
            </a>
        </div>

        <div class="side-panel right">
            <div class="stat-box">
                COORD X: 145.2<br>
                COORD Y: 890.1
            </div>
            <div class="stat-box">
                MISSION TIME:<br>
                042:12:09
            </div>
            <div class="blink" style="margin-top: auto; font-weight: bold;">[ ANOMALY DETECTED ]</div>
        </div>

        <div class="footer">
            <div style="font-size: 0.8rem; opacity: 0.6;">ARES SETTLEMENT INITIATIVE // 2026</div>
            <a href="index.html" class="exit-btn">EXIT TO BASE</a>
            <div style="font-size: 0.8rem; opacity: 0.6;">TERMINAL_ID: MARS-01</div>
        </div>
    </div>

    <script>
        function updateTheme() {
            const themeColor = localStorage.getItem('marsTheme') || '#00d4ff';
            
            // Оновлюємо основний колір
            document.documentElement.style.setProperty('--accent', themeColor);
            
            // Створюємо напівпрозору версію для світіння (glow)
            // Перетворюємо HEX у RGBA для м'якого ефекту
            const r = parseInt(themeColor.slice(1, 3), 16);
            const g = parseInt(themeColor.slice(3, 5), 16);
            const b = parseInt(themeColor.slice(5, 7), 16);
            document.documentElement.style.setProperty('--glow', `rgba(${r}, ${g}, ${b}, 0.25)`);
        }

        // Запуск при завантаженні
        updateTheme();

        // Додаємо звук та ефект "клацання"
        document.querySelectorAll('.node, .exit-btn').forEach(item => {
            item.addEventListener('mouseenter', () => {
                const hoverSnd = new Audio('click-effect.mp3');
                hoverSnd.volume = 0.1;
                hoverSnd.play().catch(() => {});
            });
        });

        // Слідкуємо за змінами в localStorage (якщо на іншій сторінці змінять колір)
        window.addEventListener('storage', updateTheme);
    </script>

 <audio id="bgMusic" loop>
    <source src="game_voce.mp3" type="audio/mpeg">
</audio>

<div id="music-control" style="position: fixed; top: 20px; right: 20px; cursor: pointer; z-index: 100; opacity: 0.5;">
    <span id="music-icon">🔇</span>
</div>

<script>
    const music = document.getElementById('bgMusic');
    const musicIcon = document.getElementById('music-icon');
    
    // Встановлюємо гучність (0.3 - оптимально для фону)
    music.volume = 0.3;

    // Функція активації звуку
    function startMusic() {
        music.play().then(() => {
            musicIcon.innerText = "🔊";
            document.getElementById('music-control').style.opacity = "1";
        }).catch(e => console.log("Чекаємо на клік для запуску звуку"));
    }

    // Запускаємо при першому кліку по будь-якій частині екрана
    window.addEventListener('click', startMusic, { once: true });

    // Кнопка вмикання/вимикання звуку
    document.getElementById('music-control').onclick = (e) => {
        e.stopPropagation(); // щоб не спрацював startMusic повторно
        if (music.paused) {
            music.play();
            musicIcon.innerText = "🔊";
        } else {
            music.pause();
            musicIcon.innerText = "🔇";
        }
    };

    /* Твій існуючий скрипт loadTheme, loadQuestion тощо... */
</script>

</body>
</html>
