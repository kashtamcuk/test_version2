<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mars OS - Main Terminal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent-color: #ff5722;
            --bg-color-1: #1a0800;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, var(--bg-color-1) 0%, #000000 100%);
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
            transition: background 0.8s ease;
        }

        /* Ефект ліній сканування (CRT) */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15) 0px,
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 100;
        }

        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 90;
        }

        #main-menu {
            position: relative;
            background: rgba(0, 0, 0, 0.85);
            padding: 70px 100px;
            border: 1px solid var(--accent-color);
            box-shadow: 0 0 50px rgba(0, 0, 0, 1), inset 0 0 20px var(--accent-color);
            backdrop-filter: blur(15px);
            text-align: center;
            z-index: 10;
        }

        .logo-section h1 {
            font-size: 4rem;
            letter-spacing: 15px;
            color: var(--accent-color);
            text-shadow: 0 0 15px var(--accent-color);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .logo-section p {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            color: #00d4ff;
            letter-spacing: 8px;
            margin-bottom: 50px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        button {
            font-family: 'Orbitron', sans-serif;
            width: 380px;
            padding: 18px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--accent-color);
            color: white;
            cursor: pointer;
            transition: 0.3s all;
            text-transform: uppercase;
            font-size: 1rem;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: var(--accent-color);
            color: black;
            box-shadow: 0 0 30px var(--accent-color);
            transform: translateY(-3px);
        }

        /* Декоративні кутики */
        .corner {
            position: absolute;
            width: 25px;
            height: 25px;
            border: 2px solid var(--accent-color);
        }
        .tl { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .tr { top: -2px; right: -2px; border-left: none; border-bottom: none; }
        .bl { bottom: -2px; left: -2px; border-right: none; border-top: none; }
        .br { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        .footer-status {
            margin-top: 45px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            color: #555;
            display: flex;
            justify-content: space-between;
        }

        .blink { animation: pulse 2s infinite; }
        @keyframes pulse { 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div class="scanlines" id="fx-layer"></div>
    <div class="vignette"></div>

    <main id="main-menu">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>

        <div class="logo-section">
            <h1>MARS OS</h1>
            <p>Ares Settlement Initiative</p>
        </div>

        <nav class="nav-buttons">
            <button onclick="window.location.href='game.html'">ІНІЦІАЛІЗУВАТИ МІСІЮ</button>
            <button onclick="window.location.href='settings.html'">КОНФІГУРАЦІЯ СИСТЕМИ</button>
            <button onclick="window.location.href='mars.html'">АРХІВ ДАНИХ</button>
        </nav>

        <div class="footer-status">
            <span>SECTOR: A-1</span>
            <span class="blink">TERMINAL ACTIVE</span>
        </div>
    </main>

<script>
    // 1. Створюємо аудіо об'єкт фонової музики
    const bgMusic = new Audio('fon_menu.mp3');
    bgMusic.loop = true;

    // 2. Функція активації звуку
    function startAudio() {
        const savedVol = localStorage.getItem('marsVol') || 70;
        bgMusic.volume = (savedVol / 100) * 0.5;

        const lastTime = localStorage.getItem('musicTime');
        if (lastTime) bgMusic.currentTime = parseFloat(lastTime);

        if (bgMusic.paused) {
            bgMusic.play().catch(e => console.log("Чекаю на взаємодію..."));
        }
    }

    // 3. Звук кліку
    function playClick() {
        const clickSnd = new Audio('click-effect.mp3'); 
        const savedVol = localStorage.getItem('marsVol') || 70;
        clickSnd.volume = savedVol / 100;
        clickSnd.play().catch(err => console.log("Файл звуку кнопки не знайдено"));
    }

    // 4. ГОЛОВНА ФУНКЦІЯ: ЗАСТОСУВАННЯ НАЛАШТУВАНЬ
    function applySavedSettings() {
        const bgColors = {
            "#ff5722": "#1a0800",
            "#00d4ff": "#000a1a",
            "#4caf50": "#051a05",
            "#e91e63": "#1a0008"
        };

        // Отримуємо збережені дані
        const theme = localStorage.getItem('marsTheme') || '#ff5722';
        const fx = localStorage.getItem('marsFX') !== 'false'; // true за замовчуванням
        const vol = localStorage.getItem('marsVol') || 70;
        const darkBg = bgColors[theme] || "#000000";

        // Застосовуємо кольори до CSS змінних
        document.documentElement.style.setProperty('--accent-color', theme);
        document.documentElement.style.setProperty('--bg-color-1', darkBg);

        // Вмикаємо/вимикаємо лінії сканування
        const fxBlock = document.getElementById('fx-layer');
        if (fxBlock) {
            fxBlock.style.display = fx ? 'block' : 'none';
        }

        // Оновлюємо гучність фонової музики "на льоту"
        bgMusic.volume = (vol / 100) * 0.5;
    }

    // 5. Ініціалізація при старті
    window.onload = function() {
        applySavedSettings();
        
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                playClick();
                startAudio();
            });
        });
    };

    // 6. Слідкуємо за змінами (якщо налаштування відкриті в іншому вікні)
    window.addEventListener('storage', () => {
        applySavedSettings();
    });

    // Починаємо грати при першому кліку будь-де
    document.addEventListener('click', startAudio, { once: true });

    // Зберігаємо прогрес музики
    setInterval(() => {
        if (!bgMusic.paused) {
            localStorage.setItem('musicTime', bgMusic.currentTime);
        }
    }, 1000);
</script>

    

</body>
</html>
