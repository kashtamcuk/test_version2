<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>MARS Central Mission - Data Check</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff5722; /* Оранжевий за замовчуванням для Марса */
            --correct: #00ff88;
            --wrong: #ff3c3c;
            --bg: #030000;
            --glow: rgba(255, 87, 34, 0.2);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                linear-gradient(var(--glow) 1px, transparent 1px),
                linear-gradient(90deg, var(--glow) 1px, transparent 1px);
            background-size: 40px 40px;
            transition: background 0.3s;
        }

        .quiz-container {
            width: 900px;
            background: rgba(10, 0, 0, 0.95);
            border: 2px solid var(--accent);
            box-shadow: 0 0 50px var(--glow);
            padding: 45px;
            position: relative;
            clip-path: polygon(0 0, 95% 0, 100% 5%, 100% 100%, 5% 100%, 0 95%);
        }

        .header {
            font-family: 'Orbitron';
            color: var(--accent);
            text-align: center;
            letter-spacing: 6px;
            margin-bottom: 35px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 20px;
            text-shadow: 0 0 20px var(--accent);
        }

        .question-text {
            font-size: 1.7rem;
            margin-bottom: 35px;
            min-height: 80px;
            font-weight: 600;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ccc;
            padding: 20px;
            font-family: 'Rajdhani';
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent);
            color: white;
            background: rgba(255, 87, 34, 0.1);
            transform: scale(1.02);
        }

        .correct { border-color: var(--correct) !important; color: var(--correct) !important; background: rgba(0, 255, 136, 0.1) !important; }
        .wrong { border-color: var(--wrong) !important; color: var(--wrong) !important; background: rgba(255, 60, 60, 0.1) !important; }

        .fact-panel {
            margin-top: 35px;
            padding: 25px;
            border: 1px solid var(--accent);
            background: rgba(255, 87, 34, 0.05);
            display: none;
            animation: emerge 0.5s ease;
        }

        @keyframes emerge {
            from { opacity: 0; clip-path: inset(0 100% 0 0); }
            to { opacity: 1; clip-path: inset(0 0 0 0); }
        }

        .fact-title {
            font-family: 'Orbitron';
            font-size: 0.9rem;
            color: var(--accent);
            margin-bottom: 10px;
            display: block;
        }

        .next-btn {
            margin-top: 30px;
            width: 100%;
            background: var(--accent);
            border: none;
            color: black;
            padding: 18px;
            font-family: 'Orbitron';
            font-weight: bold;
            cursor: pointer;
            display: none;
            letter-spacing: 3px;
        }

        .next-btn:hover { filter: brightness(1.2); }

        .footer {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            font-family: 'Orbitron';
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div class="header">MARS PLANETARY DATA INTERFACE</div>

        <div id="quiz">
            <div class="question-text" id="question">Accessing Core Database...</div>
            <div class="options-grid" id="options"></div>

            <div class="fact-panel" id="fact-box">
                <span class="fact-title">DATABASE_ENTRY // REVEALED:</span>
                <p id="fact-text"></p>
            </div>

            <button class="next-btn" id="next-button" onclick="loadNext()">PROCEED TO NEXT SECTOR</button>
        </div>

        <div class="footer">
            <span id="progress">SECTOR: 1 / 10</span>
            <a href="game.html" style="color: var(--wrong); text-decoration: none;">[ TERMINATE ]</a>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "Чому Марс називають 'Червоною планетою'?",
                options: ["Через високу температуру", "Через оксид заліза (іржу) в ґрунті", "Через колір атмосфери", "Через рослинність"],
                correct: 1,
                fact: "Поверхня Марса покрита реголітом, багатим на залізо, яке окислюється. По суті, планета просто заіржавіла."
            },
            {
                q: "Яка гора на Марсі є найвищим вулканом у Сонячній системі?",
                options: ["Еверест", "Гора Олімп", "Кратер Стікні", "Вулкан Аскрійський"],
                correct: 1,
                fact: "Гора Олімп має висоту понад 21 км, що майже в три рази вище за Еверест. Її площа дорівнює території всієї Франції."
            },
            {
                q: "Скільки часу триває один рік на Марсі?",
                options: ["365 днів", "687 земних діб", "100 днів", "2 роки 5 місяців"],
                correct: 1,
                fact: "Марс знаходиться далі від Сонця, тому його орбіта більша. Марсіанський рік майже вдвічі довший за земний."
            },
            {
                q: "Яка основна складова атмосфери Марса?",
                options: ["Кисень", "Азот", "Вуглекислий газ (CO2)", "Метан"],
                correct: 2,
                fact: "Атмосфера на 95% складається з CO2. Вона дуже розріджена — лише 1% від щільності земної атмосфери."
            },
            {
                q: "Як називається найбільша система каньйонів на Марсі?",
                options: ["Великий Каньйон", "Долини Марінера", "Рівнина Утопія", "Лабіринт Ночі"],
                correct: 1,
                fact: "Долини Марінера мають довжину понад 4000 км. Якби вони були на Землі, то простяглися б через усю територію США."
            },
            {
                q: "Чи є на Марсі рідка вода на поверхні зараз?",
                options: ["Так, океани", "Ні, тільки лід і пара", "Так, у річках", "Ні, води там ніколи не було"],
                correct: 1,
                fact: "Через низький тиск рідка вода миттєво закипає або замерзає. Але лід зосереджений на полюсах та під ґрунтом."
            },
            {
                q: "Яка сила тяжіння на Марсі порівняно із Земною?",
                options: ["Така сама", "У 10 разів сильніша", "Близько 38% від земної", "Там повна невагомість"],
                correct: 2,
                fact: "Якщо на Землі ви важите 100 кг, то на Марсі вага складатиме лише 38 кг. Ви зможете стрибати дуже високо!"
            },
            {
                q: "Як називаються пилові бурі на Марсі?",
                options: ["Торнадо", "Пилові дияволи", "Глобальні бурі", "Всі варіанти"],
                correct: 3,
                fact: "Марс відомий пиловими бурями, які іноді охоплюють усю планету на кілька місяців, закриваючи сонце для марсоходів."
            },
            {
                q: "Який перший успішний марсохід висадився на планету в 1997 році?",
                options: ["Curiosity", "Sojourner", "Perseverance", "Spirit"],
                correct: 1,
                fact: "Sojourner був розміром з мікрохвильову піч. Він став першим колісним апаратом на іншій планеті."
            },
            {
                q: "Чи має Марс магнітне поле, подібне до Земного?",
                options: ["Так, дуже потужне", "Ні, воно майже повністю відсутнє", "Тільки на екваторі", "Так, але воно синє"],
                correct: 1,
                fact: "У Марса немає глобального магнітного поля, тому сонячний вітер поступово 'здуває' його атмосферу в космос."
            }
        ];

        let idx = 0;

        function loadTheme() {
            const theme = localStorage.getItem('marsTheme') || '#ff5722';
            document.documentElement.style.setProperty('--accent', theme);
            // Робимо світіння для фону
            const r = parseInt(theme.slice(1,3), 16), g = parseInt(theme.slice(3,5), 16), b = parseInt(theme.slice(5,7), 16);
            document.documentElement.style.setProperty('--glow', `rgba(${r},${g},${b}, 0.1)`);
        }

        function loadQuestion() {
            const data = questions[idx];
            document.getElementById('question').innerText = data.q;
            document.getElementById('progress').innerText = `SECTOR: ${idx + 1} / 10`;
            
            const container = document.getElementById('options');
            container.innerHTML = '';
            
            data.options.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = opt;
                b.onclick = () => select(i);
                container.appendChild(b);
            });

            document.getElementById('fact-box').style.display = 'none';
            document.getElementById('next-button').style.display = 'none';
        }

        function select(i) {
            const data = questions[idx];
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach((b, j) => {
                b.disabled = true;
                if(j === data.correct) b.classList.add('correct');
                if(i === j && i !== data.correct) b.classList.add('wrong');
            });
            document.getElementById('fact-text').innerText = data.fact;
            document.getElementById('fact-box').style.display = 'block';
            document.getElementById('next-button').style.display = 'block';

            if(idx === questions.length - 1) document.getElementById('next-button').innerText = "COMPLETE MISSION";
        }

        function loadNext() {
            if(++idx < questions.length) loadQuestion();
            else window.location.href = 'game.html';
        }

        loadTheme();
        loadQuestion();
    </script>

    <audio id="bgMusic" loop>
    <source src="test_voce.mp3" type="audio/mpeg">
</audio>

<div id="music-control" style="position: fixed; top: 20px; right: 20px; cursor: pointer; z-index: 100; opacity: 0.5;">
    <span id="music-icon">🔇</span>
</div>

<script>
    const music = document.getElementById('bgMusic');
    const musicIcon = document.getElementById('music-icon');
    
    // Встановлюємо гучність (0.3 - оптимально для фону)
    music.volume = 0.3;

    // Функція активації звуку
    function startMusic() {
        music.play().then(() => {
            musicIcon.innerText = "🔊";
            document.getElementById('music-control').style.opacity = "1";
        }).catch(e => console.log("Чекаємо на клік для запуску звуку"));
    }

    // Запускаємо при першому кліку по будь-якій частині екрана
    window.addEventListener('click', startMusic, { once: true });

    // Кнопка вмикання/вимикання звуку
    document.getElementById('music-control').onclick = (e) => {
        e.stopPropagation(); // щоб не спрацював startMusic повторно
        if (music.paused) {
            music.play();
            musicIcon.innerText = "🔊";
        } else {
            music.pause();
            musicIcon.innerText = "🔇";
        }
    };

    /* Твій існуючий скрипт loadTheme, loadQuestion тощо... */
</script>
</body>
</html>
